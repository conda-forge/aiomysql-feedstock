{% set name = "aiomysql" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9e850677d456dc4fea59ad871d4bcdb6adbce02326aaa32a97a43125256f23de

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools_scm >=6.4,<7
    - pymysql >=1.0
  run:
    - python >={{ python_min }}
    - pymysql >=1.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - aiomysql

about:
  home: https://github.com/aio-libs/aiomysql
  summary: aiomysql is a library for accessing a MySQL database from the asyncio
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kszucs
    - xhochy
